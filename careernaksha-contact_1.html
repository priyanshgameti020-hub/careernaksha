<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareerNaksha Contact</title>

<style>
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700;800&display=swap");

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:"Inter",sans-serif;
  background:linear-gradient(135deg,#eef6ff 0%,#f0fbf4 50%,#eef6ff 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:2.5rem 1.5rem;
}

.cn-card{
  display:grid;
  grid-template-columns:1fr 1fr;
  max-width:980px;
  width:100%;
  background:#fff;
  border-radius:20px;
  border:1px solid #cfe0fb;
  box-shadow:0 10px 50px rgba(26,110,245,0.07);
  overflow:hidden;
}

.cn-left{
  background:linear-gradient(160deg,#1a6ef5 0%,#0ea875 55%,#0d9e60 100%);
  padding:3rem 2.5rem;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.cn-headline{
  font-family:"Poppins",sans-serif;
  font-size:1.8rem;
  font-weight:700;
  line-height:1.3;
  margin-bottom:1rem;
}

.cn-headline span{color:#a7f3c0;}
.cn-desc{font-size:14px;opacity:.9;line-height:1.7;}
.cn-right{padding:3rem 2.5rem;}

.cn-form-title{
  font-family:"Poppins",sans-serif;
  font-size:22px;
  font-weight:700;
  color:#0ea875;
}

.cn-form-sub{font-size:13px;color:#7baee8;margin-bottom:1.5rem;}
.cn-group{margin-bottom:1rem;}

.cn-label{
  font-size:12px;
  font-weight:600;
  margin-bottom:5px;
  display:block;
  text-transform:uppercase;
}

.cn-label-blue{color:#4a90d9;}
.cn-label-green{color:#27ae72;}

.cn-input,
.cn-phone-input,
.cn-textarea{
  width:100%;
  border:1.5px solid #cfe0fb;
  border-radius:10px;
  padding:10px 12px;
  font-size:13px;
  background:#f5f9ff;
  outline:none;
  transition:border-color .2s;
}

.cn-input:focus,.cn-phone-input:focus,.cn-textarea:focus{border-color:#1a6ef5;}

.cn-phone-row{display:flex;gap:8px;}

.cn-country{
  border:1.5px solid #b8edd4;
  border-radius:10px;
  padding:10px;
  background:#f2fbf6;
  cursor:pointer;
  white-space:nowrap;
}

.cn-textarea{resize:none;height:80px;}
.cn-actions{display:flex;gap:10px;margin-top:8px;}

.cn-btn-clear{
  flex:1;padding:11px;border-radius:10px;
  border:1.5px solid #b8edd4;background:#f2fbf6;
  cursor:pointer;font-size:14px;
}

.cn-btn-submit{
  flex:2;padding:11px;border-radius:10px;border:none;
  background:linear-gradient(135deg,#1a6ef5 0%,#0ea875 100%);
  color:#fff;font-weight:600;font-size:14px;cursor:pointer;transition:opacity .2s;
}

.cn-btn-submit:disabled{opacity:.6;cursor:not-allowed;}

.cn-toast{display:none;padding:10px 14px;border-radius:10px;margin-bottom:1rem;font-size:13px;}
.cn-toast.show{display:block;}
.cn-toast.success{background:#e6f9ef;border:1px solid #9ddfc0;color:#0d9e60;}
.cn-toast.error{background:#fff0f0;border:1px solid #f5c6c6;color:#c0392b;}

@media(max-width:640px){.cn-card{grid-template-columns:1fr;}}
</style>
</head>

<body>
<div class="cn-card">

  <!-- LEFT -->
  <div class="cn-left">
    <h2 class="cn-headline">
      Your Personal <br>
      <span>Career Counsellor</span> <br>
      Is Waiting
    </h2>
    <p class="cn-desc">
      Talk to an expert, discover your skill gap and find your dream career
      online or offline at your pace.
    </p>
  </div>

  <!-- RIGHT -->
  <div class="cn-right">
    <p class="cn-form-title">Get in Touch</p>
    <p class="cn-form-sub">We'll get back to you within 24 hours.</p>

    <div class="cn-toast" id="cn-toast"></div>

    <form id="cn-form">

      <div class="cn-group">
        <label class="cn-label cn-label-blue">Full Name</label>
        <input class="cn-input" type="text" name="name" placeholder="Rahul Sharma" required>
      </div>

      <div class="cn-group">
        <label class="cn-label cn-label-green">Mobile Number</label>
        <div class="cn-phone-row">
          <button type="button" class="cn-country">🇮🇳 +91</button>
          <input class="cn-phone-input" type="tel" name="phone"
                 placeholder="9876543210" pattern="[0-9]{10}"
                 title="Enter 10-digit mobile number" required>
        </div>
      </div>

      <div class="cn-group">
        <label class="cn-label cn-label-blue">Email Address</label>
        <input class="cn-input" type="email" name="email" placeholder="rahul@example.com" required>
      </div>

      <div class="cn-group">
        <label class="cn-label cn-label-green">Message</label>
        <textarea class="cn-textarea" name="message"
                  placeholder="Tell us what career guidance you're looking for..." required></textarea>
      </div>

      <div class="cn-actions">
        <button type="reset" class="cn-btn-clear">Clear</button>
        <button type="submit" class="cn-btn-submit" id="cn-submit">Send Message</button>
      </div>

    </form>
  </div>
</div>

<script>
  // ✏️ PASTE YOUR DEPLOYED WEB APP URL HERE (from Step 4 below)
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzKUafVD2LeRm6FKQFsehcaLN_BEB8oeQl70nimq__etI2bIeG8SzcoMmd_mXdTx2JrSw/exec";

  const form      = document.getElementById("cn-form");
  const toast     = document.getElementById("cn-toast");
  const submitBtn = document.getElementById("cn-submit");

  function showToast(message, type = "success") {
    toast.textContent = message;
    toast.className   = "cn-toast show " + type;
    setTimeout(() => { toast.className = "cn-toast"; }, 5000);
  }

  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    submitBtn.disabled    = true;
    submitBtn.textContent = "Sending…";

    try {
      const formData = new FormData(form);

      // mode: "no-cors" is required for Apps Script
      // The request IS sent; we just can't read the response body (opaque response)
      await fetch(SCRIPT_URL, {
        method : "POST",
        mode   : "no-cors",
        body   : formData
      });

      showToast("✅ Message sent! Our expert will reach out soon.", "success");
      form.reset();

    } catch (err) {
      console.error(err);
      showToast("❌ Something went wrong. Please try again.", "error");

    } finally {
      submitBtn.disabled    = false;
      submitBtn.textContent = "Send Message";
    }
  });
</script>

</body>
</html>
